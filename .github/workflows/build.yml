# .github/workflows/build.yml
name: Build and Deploy

on:
  push:
    branches: [main, master]
    # 移除 paths 限制，任何推送都触发
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # 完整历史，避免一些问题
        
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: npm ci 2>/dev/null || npm install
        
      - name: Build
        run: npm run build
        
      - name: Copy configs to dist
        run: |
          mkdir -p dist/configs
          cp configs/*.json dist/configs/ 2>/dev/null || echo "No configs to copy"
          # 确保 rewrite.conf 在 dist 根目录
          ls -la dist/
        
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: UnifiedVIP
          keep_files: false  # 完全替换，避免残留
          
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: build-output
          path: |
            dist/*.js
            dist/*.conf
            dist/configs/*.json
